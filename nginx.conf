# nginx.conf
#
# Static root is dist/client from the lite Vite build (see lite.Dockerfile: Node runs
# vite for prerender; Bun alone yields 0 prerendered pages in Linux/Docker).
# copied to /app/out. Layout:
#   _shell.html or index.html — SPA shell at site root (TanStack version / mode dependent)
#   config|docs|login|playground|routes|servers/index.html — prerendered app routes
#   docs/**/index.html  — nested docs pages
#   llms.mdx/           — MDX tree (e.g. for LLM context)
#   assets/             — hashed .js, .css, images, fonts, etc.
#   __tsr/staticServerFnCache/*.json — TanStack Start server-fn cache
#   favicon.ico, manifest.json, apple-icon.png, icon0.svg, robots.txt — public root files

server {
    listen 80;
    server_name _;

    root /app/out;
    index index.html;

    # Avoid automatic 301 redirects for directories to prevent loops with SPA routers
    absolute_redirect off;

    # Exact file, directory index, optional .html path, then SPA shell.
    # Use a named location + rewrite break (not try_files … /_shell.html): an internal
    # redirect to /_shell.html re-enters this block; if the file is missing or not
    # served, nginx can loop until 500.
    location / {
        error_page 418 = @head_silent;
        if ($request_method = HEAD) {
            return 418;
        }

        try_files $uri $uri/index.html $uri.html @spa;
    }

    location @head_silent {
        access_log off;
        try_files $uri $uri/index.html $uri.html @spa_silent;
    }

    location @spa_silent {
        access_log off;
        root /app/out;
        try_files /_shell.html /index.html =404;
    }

    location @spa {
        # Prefer current TanStack SPA output, then older/root index shell builds.
        root /app/out;
        try_files /_shell.html /index.html =404;
    }

    # TanStack Start: staticServerFnCache JSON (under __tsr/)
    location /__tsr {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Hashed bundles and typical static extensions
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location = /favicon.ico {
        try_files $uri =204;
        access_log off;
        expires 30d;
    }
}
