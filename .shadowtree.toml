shell = "sh"

shell_prelude = '''
webui_root=$(pwd)
src_dir=src
schema_dir=$src_dir/types/godoxy
build_date=${BUILD_DATE:-$(date -u +'%Y%m%d-%H%M%S')}
'''

[env]
BUILDKIT_PROGRESS="plain"

[recipes.dev]
help = "Start the WebUI development compose stack."
sandboxed = false
cmd = ["docker", "compose", "up", "--build", "--pull=never"]

[recipes.commit-push]
help = "Format, commit, and push WebUI changes."
sandboxed = false
cmd = '''
bun format:write
git add .
git commit
git push
'''

[recipes.update-wiki]
help = "Pull the checked-out public wiki worktree."
sandboxed = false
cmd = ["git", "-C", "public/wiki", "pull"]

[recipes.build-wiki]
help = "Build wiki assets through a temporary worktree."
sandboxed = false
cmd = '''
[ -d "$webui_root/public/wiki" ] && rm -r "$webui_root/public/wiki" || true
git -C wiki worktree add "/tmp/wiki-$build_date" HEAD
trap 'cd "$webui_root" && git -C wiki worktree remove "/tmp/wiki-'"$build_date"'" --force' EXIT
cd "/tmp/wiki-$build_date"
bun i -D --frozen-lockfile
sed -i "s|srcDir: 'src',|srcDir: 'src', base: '/wiki',|" .vitepress/config.mts
sed -i "s|link: '/'|link: '/../', rel: 'noopener noreferrer', target: '_self'|" .vitepress/config.mts
head -n 10 .vitepress/config.mts
bun --bun run docs:build
cp -r .vitepress/dist "$webui_root/public/wiki"
'''

[recipes.gen-schema-single]
help = "Generate one WebUI JSON schema."
sandboxed = false
cmd = '''
bunx --bun ts-json-schema-generator --minify --no-type-check -e export --no-ref-encode -f ./tsconfig.json -o "$schema_dir/{out}" -p "$schema_dir/{in}" -t "{class}"
bun --bun "$schema_dir/deref.ts" "$schema_dir/{out}"
'''

[recipes.gen-schema-single.arguments.in]
help = "Input TypeScript file below src/types/godoxy."
required = true

[recipes.gen-schema-single.arguments.class]
help = "TypeScript type or class to export."
required = true

[recipes.gen-schema-single.arguments.out]
help = "Output JSON schema filename."
required = true

[recipes.gen-schema]
help = "Generate all WebUI JSON schemas."
sandboxed = false
cmd = '''
@gen-schema-single in=config/config.ts class=Config out=config.schema.json
@gen-schema-single in=config/autocert.ts class=AutocertConfigWithoutExtra out=autocert.schema.json
@gen-schema-single in=providers/routes.ts class=Routes out=routes.schema.json
@gen-schema-single in=middlewares/middleware_compose.ts class=MiddlewareCompose out=middleware_compose.schema.json
@gen-schema-single in=docker.ts class=DockerRoutes out=docker_routes.schema.json
@gen-schema-single in=config/acl.ts class=ACLConfig out=acl.schema.json
@gen-schema-single in=config/maxmind.ts class=MaxmindConfig out=maxmind.schema.json
'''

[recipes.gen-docker-compose-types]
help = "Generate Docker Compose TypeScript types when missing."
sandboxed = false
cmd = '''
[ -f "$schema_dir/types/compose-spec.json" ] || curl -o "$schema_dir/types/compose-spec.json" https://raw.githubusercontent.com/compose-spec/compose-spec/main/schema/compose-spec.json
[ -f "$schema_dir/types/compose-spec.ts" ] || bunx json-schema-to-typescript "$schema_dir/types/compose-spec.json" "$schema_dir/types/compose-spec.ts"
'''
